<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Learner A1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Customizing a sleek dark theme palette
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        darkCard: '#1E1E1E',
                        accentAmber: '#F59E0B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 min-h-screen font-sans">

    <header class="border-b border-gray-800 p-6 sticky top-0 bg-darkBg z-10">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">German A1 Course</h1>
            <span class="text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full">Student Portal</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 mt-4 space-y-4" id="module-container">
        </main>

    <div id="payment-modal" class="fixed inset-0 bg-black/80 flex items-end sm:items-center justify-center p-4 hidden z-50">
        <div class="bg-darkCard w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 border border-gray-800 transform transition-transform">
            <h3 class="text-xl font-bold mb-2" id="modal-title">Unlock Module</h3>
            <p class="text-gray-400 text-sm mb-6" id="modal-description">Get instant access to all grammar, vocabulary exercises, and audio tracks.</p>
            
            <div class="space-y-3">
                <button onclick="simulatePayment()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition">
                    Simulate Successful Payment (Test Mode)
                </button>
                <button onclick="closeModal()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-3 px-4 rounded-xl transition">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Define your curriculum
        const curriculum = [
            { id: "A1.1", title: "German A1.1", description: "The Basics & Introductions", price: "Free" },
            { id: "A1.2", title: "German A1.2", description: "Daily Life & Shopping", price: "100 KES" }
        ];

        let activeTargetModuleId = null;

        // 2. Initialize or fetch unlocked modules from browser storage
        // A1.1 is ALWAYS unlocked by default
        if (!localStorage.getItem('unlocked_modules')) {
            localStorage.setItem('unlocked_modules', JSON.stringify(['A1.1']));
        }

        function getUnlockedModules() {
            return JSON.parse(localStorage.getItem('unlocked_modules'));
        }

        // 3. Render the module list dynamically
        function renderModules() {
            const container = document.getElementById('module-container');
            const unlockedList = getUnlockedModules();
            container.innerHTML = '';

            curriculum.forEach((module, index) => {
                const isUnlocked = unlockedList.includes(module.id);
                
                // Create card elements
                const card = document.createElement('div');
                card.className = `p-5 rounded-2xl border transition-all duration-200 cursor-pointer ${
                    isUnlocked 
                    ? 'bg-darkCard border-gray-800 shadow-lg hover:border-gray-700' 
                    : 'bg-zinc-900/50 border-zinc-900 opacity-60'
                }`;
                
                card.onclick = () => handleModuleClick(module.id, isUnlocked, module.price);

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-lg font-bold ${isUnlocked ? 'text-white' : 'text-gray-500'}">${module.title}</h2>
                            <p class="text-sm text-gray-400 mt-1">${module.description}</p>
                        </div>
                        <div>
                            ${isUnlocked 
                                ? `<svg class="w-8 h-8 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>`
                                : `<svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 4. Handle user interactions
        function handleModuleClick(id, isUnlocked, price) {
            if (isUnlocked) {
                alert(`Opening contents for ${id}! (You can redirect to your grammar page here)`);
            } else {
                activeTargetModuleId = id;
                document.getElementById('modal-title').innerText = `Unlock ${id}`;
                document.getElementById('modal-description').innerText = `Unlock premium access to all lessons in this block for just ${price}.`;
                document.getElementById('payment-modal').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('payment-modal').classList.add('hidden');
            activeTargetModuleId = null;
        }

        function simulatePayment() {
            if (activeTargetModuleId) {
                const unlockedList = getUnlockedModules();
                if (!unlockedList.includes(activeTargetModuleId)) {
                    unlockedList.push(activeTargetModuleId);
                    localStorage.setItem('unlocked_modules', JSON.stringify(unlockedList));
                }
                closeModal();
                renderModules(); // Instant UI refresh!
            }
        }

        // Start the app view
        renderModules();
    </script>
</body>
</html>
